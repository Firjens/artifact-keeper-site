name: Site Bug Report
description: Report a rendering, build, or functional issue with the documentation site
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        This template is for reporting issues with the site itself (broken rendering, build failures, navigation bugs, search issues). For content issues (typos, incorrect info, missing docs), please use the Documentation Issue template instead.

  - type: textarea
    id: description
    attributes:
      label: Description
    validations:
      required: true

  - type: input
    id: page-url
    attributes:
      label: Page URL
      placeholder: "https://artifactkeeper.com/docs/..."
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Browser:
        - Browser Version:
        - Operating System:
    validations:
      required: false

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: observed-behavior
    attributes:
      label: Observed Behavior
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to make sure this is not a duplicate
          required: true
        - label: This is a site rendering or functional issue, not a content issue
          required: true
